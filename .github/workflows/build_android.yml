name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libsqlite3-dev \
            sqlite3 \
            bzip2 \
            libbz2-dev \
            liblzma-dev \
            libreadline-dev \
            uuid-dev \
            libffi-dev \
            libssl-dev \
            unzip \
            zip \
            tar \
            autoconf \
            libtool \
            pkg-config

      - name: Upgrade Host Pip and Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel virtualenv cython buildozer

      - name: Cache Buildozer Global Directory (SDK/NDK)
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-global-${{ hashFiles('buildozer.spec') }}

      - name: Cache Local Buildozer Directory (Compiled Recipes)
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-local-v3-${{ hashFiles('buildozer.spec') }}

      - name: Clone and Patch python-for-android
        run: |
          git clone --depth 1 -b master https://github.com/kivy/python-for-android.git python-for-android
          python3 << 'EOF'
          with open('python-for-android/pythonforandroid/build.py', 'r') as f:
              code = f.read()
          code = code.replace("shprint(host_python, '-m', 'venv', 'venv')", "shprint(host_python, '-m', 'venv', '--clear', 'venv')")
          code = code.replace('"source venv/bin/activate && pip install -U pip"', '"source venv/bin/activate && pip --version"')
          with open('python-for-android/pythonforandroid/build.py', 'w') as f:
              f.write(code)
          EOF

      - name: Build Android debug APK
        env:
          APP_P4A_SOURCE_DIR: ${{ github.workspace }}/python-for-android
        run: |
          # Clear the cached python-for-android compilation venv to avoid the stale pip resolvelib bug
          find .buildozer -name "venv" -type d -exec rm -rf {} + || true
          buildozer android debug > buildozer.log 2>&1



      - name: Print Buildozer Log on Failure
        if: failure()
        run: |
          echo "=== BUILDOZER FAILURE LOG (LAST 300 LINES) ==="
          tail -n 300 buildozer.log
          python3 -c "
          import sys
          try:
              with open('buildozer.log', 'r', encoding='utf-8', errors='ignore') as f:
                  lines = f.readlines()
              # Find lines containing error/failed/exception in the last 200 lines
              errors = []
              for line in lines[-200:]:
                  l_lower = line.lower()
                  if 'error' in l_lower or 'failed' in l_lower or 'exception' in l_lower:
                      errors.append(line.strip())
              if not errors:
                  errors = [line.strip() for line in lines[-30:]]
              print('=== EXTRACTED ANNOTATION ERRORS ===')
              for err in errors[:15]:
                  # Print as GitHub Actions annotation
                  print(f'::error::{err}')
          except Exception as e:
              print(f'Error parsing log: {e}')
          "


      - name: Upload Buildozer Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Buildozer-Compilation-Log
          path: buildozer.log

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PharmaGlobe-Android-Debug
          path: bin/*.apk

      - name: Create or Update GitHub Release
        if: success() && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Android APK Build
          body: |
            Here is the latest compiled debug APK of PharmaGlobe Mobile.
            
            Download it directly on your Android device to install and run the application.
          draft: false
          prerelease: false
          files: bin/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


