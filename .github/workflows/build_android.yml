name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libsqlite3-dev \
            sqlite3 \
            bzip2 \
            libbz2-dev \
            liblzma-dev \
            libreadline-dev \
            uuid-dev \
            libffi-dev \
            libssl-dev \
            unzip \
            zip \
            tar \
            autoconf \
            libtool \
            pkg-config

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython virtualenv

      - name: Cache Buildozer Global Directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}

      - name: Build Android debug APK
        run: |
          buildozer android clean || true
          buildozer android debug > buildozer.log 2>&1



      - name: Print Buildozer Log on Failure
        if: failure()
        run: |
          echo "=== BUILDOZER FAILURE LOG (LAST 300 LINES) ==="
          tail -n 300 buildozer.log
          python3 -c "
          import sys
          try:
              with open('buildozer.log', 'r', encoding='utf-8', errors='ignore') as f:
                  lines = f.readlines()
              # Find lines containing error/failed/exception in the last 200 lines
              errors = []
              for line in lines[-200:]:
                  l_lower = line.lower()
                  if 'error' in l_lower or 'failed' in l_lower or 'exception' in l_lower:
                      errors.append(line.strip())
              if not errors:
                  errors = [line.strip() for line in lines[-30:]]
              print('=== EXTRACTED ANNOTATION ERRORS ===')
              for err in errors[:15]:
                  # Print as GitHub Actions annotation
                  print(f'::error::{err}')
          except Exception as e:
              print(f'Error parsing log: {e}')
          "


      - name: Upload Buildozer Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Buildozer-Compilation-Log
          path: buildozer.log

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PharmaGlobe-Android-Debug
          path: bin/*.apk


